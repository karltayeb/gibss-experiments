# Snakemake profile for UChicago RCC Midway3 (SLURM via the cluster-generic
# plugin - the same convention as the sibling experiments in this repo).
#
#   cd gsea_examples/pbmc_purified && uv run snakemake --profile profile
#
# Per-rule mem_mb / runtime (minutes) / threads come from the Snakefile and are
# substituted into the sbatch line below. --output is relative to the run dir
# (gsea_examples/pbmc_purified), so logs land in ./logs/ regardless of checkout path.
#
# >>> EDIT --account / --partition if your allocation differs. <<<

executor: cluster-generic
cluster-generic-submit-cmd: "mkdir -p logs && sbatch --account=pi-mstephens --partition=caslake --qos=caslake --mem={resources.mem_mb} --cpus-per-task={threads} --time={resources.runtime} --job-name=pbmc-{rule} --output=logs/%j_{rule}.out --parsable"

default-resources:
  mem_mb: 8000
  runtime: 60
  partition: "caslake"

jobs: 100                # max SLURM jobs queued/running at once
cores: 1                 # local cores for the driver process
latency-wait: 60         # wait for NFS to expose outputs before erroring
retries: 1               # resubmit a failed job once (transient node failures)
rerun-incomplete: true
keep-going: true         # don't halt the whole DAG on one failed factor
show-failed-logs: true
printshellcmds: true
