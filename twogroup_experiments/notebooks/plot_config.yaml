    method_families:
      - cox_heavy
      - logistic_oracle
      - logistic_threshold
      - cox_light_threshold
      - twogroup
      - twogroup_scale_fam
      - twogroup_loc_fam
      - twogroup_oracle
      - twogroup_oracle_init
    L:
      - 1
    thresholds:
      - 0.0
      - 1.0
      - 2.0
      - 3.0
      - 4.0
  twogroup_ser:
    method_families:
      - twogroup
      - twogroup_oracle
      - twogroup_oracle_init
      - twogroup_scale_fam
      - twogroup_loc_fam
    L:
      - 1
