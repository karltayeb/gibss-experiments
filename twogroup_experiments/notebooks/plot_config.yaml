settings:
  all_methods: null
  minimal:
    method_families:
      - twogroup_oracle
      - cox_heavy
      - cox_light_threshold
      - logistic_threshold
      - linear_fixed
    thresholds:
      - 2.0
  threshold_methods:
    thresholds: null
  twogroup_methods:
    method_families:
      - twogroup_oracle
      - twogroup_oracle_init
      - twogroup
      - twogroup_scale_fam
      - twogroup_loc_fam
  twogroup_loc_methods:
    method_families:
      - twogroup_oracle
      - twogroup_oracle_init
      - twogroup
      - twogroup_loc_fam
  twogroup_scale_methods:
    method_families:
      - twogroup_oracle
      - twogroup_oracle_init
      - twogroup
      - twogroup_c_fam
  heavy_vs_light:
    method_families:
      - cox_heavy
      - cox_light_threshold
      - logistic_threshold
    thresholds: null
  twogroup_vs_heavy:
    method_families:
      - twogroup
      - twogroup_scale_fam
      - twogroup_loc_fam
      - twogroup_oracle
      - cox_heavy
