supercollections:
  007-hallmark-null-intercept-loc:
    collections:
      template:
        design: hallmark
        signal: loc_0.0
        error: gaussian
      over:
        enrichment:
        - null_b0_int-3
        - null_b0
        - null_b0_int-1
        - null_b0_int0
      aliases:
      - intercept=-3
      - intercept=-2
      - intercept=-1
      - intercept=0
    methods:
    - cox_reversed__L=1
    - cox__threshold=2.00__L=1
    - linear_fixed__L=1
    - logistic_threshold__threshold=2.00__L=1
    - twogroup__L=1
    - twogroup_loc_fam__L=1
    - twogroup_oracle__L=1
    default_args:
      min_log_bf: 2.0
      max_cs_size: 10000
      max_fdp: 0.5
    outputs:
    - name: minimal
      method_filter: &id001
      - twogroup_oracle__L=1
      - cox_reversed__L=1
      - cox__threshold=2.00__L=1
      - logistic_threshold__threshold=2.00__L=1
      - linear_fixed__L=1
      analyses:
      - pip
      - cs
      - logbf
    - name: minimal-loc
      method_filter: &id002
      - twogroup_oracle__L=1
      - twogroup__L=1
      - twogroup_loc_fam__L=1
      analyses:
      - pip
      - cs
      - logbf
