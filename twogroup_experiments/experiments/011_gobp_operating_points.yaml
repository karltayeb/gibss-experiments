# 011 GO:BP operating points: simulate at each of the 72 feature-log-BF operating points
# (analysis/feature_logbf_level_curves.qmd). Design = GO:BP (GOBP_ sets of c5.all) filtered
# to size in [10,500]; b0=-2 fixed. Each cell is a point on an iso-E[feature_log_bf] curve for
# one set size (m=50/100/200/400, drawn from [40,60]/[80,120]/[160,240]/[320,480]) at one of
# three localization-evidence tiers - weak (feature_log_bf~10, ser_log_bf~1.4), intermediate
# (~15, ser_log_bf~6.4), strong (~20, ser_log_bf~11.4, log p~8.6) - split into three
# enrichment-vs-signal trade-off regimes (enrich/balanced/signal) by normalized arc length
# along the curve. loc cells vary mu at tau0=0.01; scale cells vary sigma at mu=0.
# 2 scenarios x 4 sizes x 3 tiers x 3 regimes = 72 cells; n_batches x 50 replicates each.
# Each cell also carries a PAIRED NULL (null_b0: same design+signal, b=0) so coverage/CS
# analyses aren't diluted by null sims (has_causal restricts coverage; min_log_bf filters CSs)
# and so log-BF ROC / null-based FDP have negatives.
_anchors:
  op_methods: &op_methods
     [twogroup_oracle__L=1, twogroup_loc_fam__L=1, twogroup_scale_fam__L=1,
      logistic_threshold__threshold=1.00__L=1, logistic_threshold__threshold=2.00__L=1, logistic_threshold__threshold=3.00__L=1, logistic_threshold__threshold=4.00__L=1,
      cox__threshold=1.00__L=1, cox__threshold=2.00__L=1, cox__threshold=3.00__L=1, cox__threshold=4.00__L=1,
      cox_reversed__L=1, cox_full__L=1, linear_fixed__L=1]
  default_args: &default_args {min_log_bf: 2.0, max_cs_size: 10000, max_fdp: 0.5}

supercollections:
  011-gobp-operating-points:
    n_batches: 4
    collections:
      - name: loc_m50_weak_enrich
        alias: loc_m50_weak_enrich
        simulations:
        - design: gobp_10_500
          enrichment: op_b4.00_s40_60
          signal: op_loc_1.10
          error: gaussian
        - design: gobp_10_500
          enrichment: null_b0
          signal: op_loc_1.10
          error: gaussian
      - name: loc_m50_weak_balanced
