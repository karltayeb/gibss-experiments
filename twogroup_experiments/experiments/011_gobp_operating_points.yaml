        simulations:
          - {design: gobp_10_500, enrichment: op_b1.21_s80_120, signal: op_loc_4.00, error: gaussian}
          - {design: gobp_10_500, enrichment: null_b0, signal: op_loc_4.00, error: gaussian}
      - name: loc_m200_enrich
        alias: loc_m200_enrich
