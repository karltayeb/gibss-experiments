supercollections:
  004-hallmark-scale-snr:
    collections:
      template:
        design: hallmark
        error: gaussian
        enrichment:
        - ser_b2
        - null_b0
      over:
        signal:
        - scale_0.75
        - scale_1.0
        - scale_1.5
        - scale_1.75
        - scale_2.0
        - scale_2.25
        - scale_3.0
        - scale_4.0
        - scale_5.0
      aliases:
      - scale=0.75
      - scale=1.00
      - scale=1.50
      - scale=1.75
      - scale=2.00
      - scale=2.25
      - scale=3.00
      - scale=4.00
      - scale=5.00
    methods:
    - cox_reversed__L=1
    - cox__threshold=2.00__L=1
    - linear_fixed__L=1
    - logistic_threshold__threshold=2.00__L=1
    - twogroup__L=1
    - twogroup_oracle__L=1
    - twogroup_scale_fam__L=1
    default_args:
      min_log_bf: 2.0
      max_cs_size: 10000
      max_fdp: 0.5
    outputs:
    - name: minimal
      method_filter: &id001
      - twogroup_oracle__L=1
      - cox_reversed__L=1
      - cox__threshold=2.00__L=1
      - logistic_threshold__threshold=2.00__L=1
      - linear_fixed__L=1
      analyses:
      - pip
      - cs
      - logbf
      - pip_non_null
      - cs_non_null
    - name: minimal-scale
      method_filter: &id002
      - twogroup_oracle__L=1
      - twogroup__L=1
      - twogroup_scale_fam__L=1
      analyses:
      - pip
      - cs
      - logbf
      - pip_non_null
      - cs_non_null
    - name: minimal_no_linear
      method_filter: &id003
      - twogroup_oracle__L=1
      - cox_reversed__L=1
      - cox__threshold=2.00__L=1
      - logistic_threshold__threshold=2.00__L=1
      analyses:
      - pip
      - cs
      - logbf
      - pip_non_null
      - cs_non_null
