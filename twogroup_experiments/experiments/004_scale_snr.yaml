_anchors:
  scale_signals: &scale_signals [scale_0.75, scale_1.0, scale_1.5, scale_1.75, scale_2.0, scale_2.25, scale_3.0, scale_4.0, scale_5.0]
  scale_aliases: &scale_aliases [scale=0.75, scale=1.00, scale=1.50, scale=1.75, scale=2.00, scale=2.25, scale=3.00, scale=4.00, scale=5.00]
  minimal: &minimal
    [twogroup_oracle__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1, logistic_threshold__threshold=2.00__L=1, linear_fixed__L=1]
  minimal_no_linear: &minimal_no_linear
    [twogroup_oracle__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1, logistic_threshold__threshold=2.00__L=1]
  minimal_scale: &minimal_scale [twogroup_oracle__L=1, twogroup__L=1, twogroup_scale_fam__L=1]
  default_args: &default_args {min_log_bf: 2.0, max_cs_size: 10000, max_fdp: 0.5}
  methods_scale: &methods_scale
    [cox_reversed__L=1, cox__threshold=2.00__L=1, linear_fixed__L=1, logistic_threshold__threshold=2.00__L=1,
     twogroup__L=1, twogroup_oracle__L=1, twogroup_scale_fam__L=1]
  all_analyses: &all_analyses [pip, cs, logbf, pip_non_null, cs_non_null]

supercollections:
  004-hallmark-scale-snr:
    collections:
      template: {design: hallmark, error: gaussian, enrichment: [ser_b2, null_b0]}
      over: {signal: *scale_signals}
      aliases: *scale_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,           method_filter: *minimal,           analyses: *all_analyses}
      - {name: minimal-scale,     method_filter: *minimal_scale,     analyses: *all_analyses}
      - {name: minimal_no_linear, method_filter: *minimal_no_linear, analyses: *all_analyses}

  004-c4-scale-snr:
    collections:
      template: {design: c4, error: gaussian, enrichment: [ser_b2, null_b0]}
      over: {signal: *scale_signals}
      aliases: *scale_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,           method_filter: *minimal,           analyses: *all_analyses}
      - {name: minimal-scale,     method_filter: *minimal_scale,     analyses: *all_analyses}
      - {name: minimal_no_linear, method_filter: *minimal_no_linear, analyses: *all_analyses}

  004-gaussian-p100-scale-snr:
    collections:
      template: {design: gaussian_rho0.90_n500_p100, error: gaussian, enrichment: [ser_b2, null_b0]}
      over: {signal: *scale_signals}
      aliases: *scale_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,           method_filter: *minimal,           analyses: *all_analyses}
      - {name: minimal-scale,     method_filter: *minimal_scale,     analyses: *all_analyses}
      - {name: minimal_no_linear, method_filter: *minimal_no_linear, analyses: *all_analyses}

  004-uniform-p100-scale-snr:
    collections:
      template: {design: uniform_rho0.90_n500_p100, error: gaussian, enrichment: [ser_b2, null_b0]}
      over: {signal: *scale_signals}
      aliases: *scale_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,           method_filter: *minimal,           analyses: *all_analyses}
      - {name: minimal-scale,     method_filter: *minimal_scale,     analyses: *all_analyses}
      - {name: minimal_no_linear, method_filter: *minimal_no_linear, analyses: *all_analyses}
