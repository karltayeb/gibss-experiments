# 001 n-samples sweep: vary n across collections (rho=0.9, p=200), with the
# within-collection ser/null pair for the with-null supercollections.
_anchors:
  n_aliases: &n_aliases [n=200, n=500, n=1000, n=2000]
  gaussian_n: &gaussian_n
    [gaussian_rho0.90_n200_p200, gaussian_rho0.90_n500_p200, gaussian_rho0.90_n1000_p200, gaussian_rho0.90_n2000_p200]
  uniform_n: &uniform_n
    [uniform_rho0.90_n200_p200, uniform_rho0.90_n500_p200, uniform_rho0.90_n1000_p200, uniform_rho0.90_n2000_p200]
  minimal: &minimal
    [twogroup_oracle__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1, logistic_threshold__threshold=2.00__L=1, linear_fixed__L=1]
  minimal_no_linear: &minimal_no_linear
    [twogroup_oracle__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1, logistic_threshold__threshold=2.00__L=1]
  minimal_loc: &minimal_loc [twogroup_oracle__L=1, twogroup__L=1, twogroup_loc_fam__L=1]
  minimal_scale: &minimal_scale [twogroup_oracle__L=1, twogroup__L=1, twogroup_scale_fam__L=1]
  default_args: &default_args {min_log_bf: 2.0, max_cs_size: 10000, max_fdp: 0.5}
  methods_loc: &methods_loc
    [twogroup_oracle__L=1, twogroup__L=1, twogroup_loc_fam__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1,
     logistic_threshold__threshold=2.00__L=1, linear_fixed__L=1]
  methods_scale: &methods_scale
    [twogroup_oracle__L=1, twogroup__L=1, twogroup_scale_fam__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1,
     logistic_threshold__threshold=2.00__L=1, linear_fixed__L=1]

supercollections:
  001-gaussian-n-samples-loc-non-null:
    collections:
      template: {enrichment: ser_b2, signal: loc_2.0, error: gaussian}
      over: {design: *gaussian_n}
      aliases: *n_aliases
    methods: *methods_loc
    default_args: *default_args
    outputs:
      - {name: minimal,     method_filter: *minimal,     analyses: [pip, pip_non_null, cs, cs_non_null]}
      - {name: minimal-loc, method_filter: *minimal_loc, analyses: [pip, pip_non_null, cs, cs_non_null]}

  001-gaussian-n-samples-scale-non-null:
    collections:
      template: {enrichment: ser_b2, signal: scale_2.0, error: gaussian}
      over: {design: *gaussian_n}
      aliases: *n_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,            method_filter: *minimal,           analyses: [pip, pip_non_null, cs, cs_non_null]}
      - {name: minimal-scale,      method_filter: *minimal_scale,     analyses: [pip, pip_non_null, cs, cs_non_null]}
      - {name: minimal_no_linear,  method_filter: *minimal_no_linear, analyses: [pip, pip_non_null, cs, cs_non_null]}

  001-gaussian-n-samples-loc:
    collections:
      template: {enrichment: [ser_b2, null_b0], signal: loc_2.0, error: gaussian}
      over: {design: *gaussian_n}
      aliases: *n_aliases
    methods: *methods_loc
    default_args: *default_args
    outputs:
      - {name: minimal,     method_filter: *minimal,     analyses: [pip, cs, logbf]}
      - {name: minimal-loc, method_filter: *minimal_loc, analyses: [pip, cs, logbf]}

  001-gaussian-n-samples-scale:
    collections:
      template: {enrichment: [ser_b2, null_b0], signal: scale_2.0, error: gaussian}
      over: {design: *gaussian_n}
      aliases: *n_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,            method_filter: *minimal,           analyses: [pip, cs, logbf]}
      - {name: minimal-scale,      method_filter: *minimal_scale,     analyses: [pip, cs, logbf]}
      - {name: minimal_no_linear,  method_filter: *minimal_no_linear, analyses: [pip, cs, logbf]}

  001-uniform-n-samples-loc-non-null:
    collections:
      template: {enrichment: ser_b2, signal: loc_2.0, error: gaussian}
      over: {design: *uniform_n}
      aliases: *n_aliases
    methods: *methods_loc
    default_args: *default_args
    outputs:
      - {name: minimal,     method_filter: *minimal,     analyses: [pip, pip_non_null, cs, cs_non_null]}
      - {name: minimal-loc, method_filter: *minimal_loc, analyses: [pip, pip_non_null, cs, cs_non_null]}

  001-uniform-n-samples-scale-non-null:
    collections:
      template: {enrichment: ser_b2, signal: scale_2.0, error: gaussian}
      over: {design: *uniform_n}
      aliases: *n_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,            method_filter: *minimal,           analyses: [pip, pip_non_null, cs, cs_non_null]}
      - {name: minimal-scale,      method_filter: *minimal_scale,     analyses: [pip, pip_non_null, cs, cs_non_null]}
      - {name: minimal_no_linear,  method_filter: *minimal_no_linear, analyses: [pip, pip_non_null, cs, cs_non_null]}

  001-uniform-n-samples-loc:
    collections:
      template: {enrichment: [ser_b2, null_b0], signal: loc_2.0, error: gaussian}
      over: {design: *uniform_n}
      aliases: *n_aliases
    methods: *methods_loc
    default_args: *default_args
    outputs:
      - {name: minimal,     method_filter: *minimal,     analyses: [pip, cs, logbf]}
      - {name: minimal-loc, method_filter: *minimal_loc, analyses: [pip, cs, logbf]}

  001-uniform-n-samples-scale:
    collections:
      template: {enrichment: [ser_b2, null_b0], signal: scale_2.0, error: gaussian}
      over: {design: *uniform_n}
      aliases: *n_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,            method_filter: *minimal,           analyses: [pip, cs, logbf]}
      - {name: minimal-scale,      method_filter: *minimal_scale,     analyses: [pip, cs, logbf]}
      - {name: minimal_no_linear,  method_filter: *minimal_no_linear, analyses: [pip, cs, logbf]}
