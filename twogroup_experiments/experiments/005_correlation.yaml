_anchors:
  rho_aliases: &rho_aliases [rho=0.00, rho=0.50, rho=0.80, rho=0.90, rho=0.95, rho=0.99]
  gaussian_rho: &gaussian_rho
    [gaussian_rho0.00_n500_p100, gaussian_rho0.50_n500_p100, gaussian_rho0.80_n500_p100,
     gaussian_rho0.90_n500_p100, gaussian_rho0.95_n500_p100, gaussian_rho0.99_n500_p100]
  uniform_rho: &uniform_rho
    [uniform_rho0.00_n500_p100, uniform_rho0.50_n500_p100, uniform_rho0.80_n500_p100,
     uniform_rho0.90_n500_p100, uniform_rho0.95_n500_p100, uniform_rho0.99_n500_p100]
  minimal: &minimal
    [twogroup_oracle__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1, logistic_threshold__threshold=2.00__L=1, linear_fixed__L=1]
  minimal_no_linear: &minimal_no_linear
    [twogroup_oracle__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1, logistic_threshold__threshold=2.00__L=1]
  minimal_loc: &minimal_loc [twogroup_oracle__L=1, twogroup__L=1, twogroup_loc_fam__L=1]
  minimal_scale: &minimal_scale [twogroup_oracle__L=1, twogroup__L=1, twogroup_scale_fam__L=1]
  default_args: &default_args {min_log_bf: 2.0, max_cs_size: 10000, max_fdp: 0.5}
  methods_loc: &methods_loc
    [cox_reversed__L=1, cox__threshold=2.00__L=1, linear_fixed__L=1, logistic_threshold__threshold=2.00__L=1,
     twogroup__L=1, twogroup_loc_fam__L=1, twogroup_oracle__L=1]
  methods_scale: &methods_scale
    [cox_reversed__L=1, cox__threshold=2.00__L=1, linear_fixed__L=1, logistic_threshold__threshold=2.00__L=1,
     twogroup__L=1, twogroup_oracle__L=1, twogroup_scale_fam__L=1]
  all_analyses: &all_analyses [pip, cs, logbf, pip_non_null, cs_non_null]

supercollections:
  005-gaussian-correlation-loc:
    collections:
      template: {signal: loc_2.0, error: gaussian, enrichment: [ser_b2, null_b0]}
      over: {design: *gaussian_rho}
      aliases: *rho_aliases
    methods: *methods_loc
    default_args: *default_args
    outputs:
      - {name: minimal,     method_filter: *minimal,     analyses: *all_analyses}
      - {name: minimal-loc, method_filter: *minimal_loc, analyses: *all_analyses}

  005-gaussian-correlation-scale:
    collections:
      template: {signal: scale_2.0, error: gaussian, enrichment: [ser_b2, null_b0]}
      over: {design: *gaussian_rho}
      aliases: *rho_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,           method_filter: *minimal,           analyses: *all_analyses}
      - {name: minimal-scale,     method_filter: *minimal_scale,     analyses: *all_analyses}
      - {name: minimal_no_linear, method_filter: *minimal_no_linear, analyses: *all_analyses}

  005-uniform-correlation-loc:
    collections:
      template: {signal: loc_2.0, error: gaussian, enrichment: [ser_b2, null_b0]}
      over: {design: *uniform_rho}
      aliases: *rho_aliases
    methods: *methods_loc
    default_args: *default_args
    outputs:
      - {name: minimal,     method_filter: *minimal,     analyses: *all_analyses}
      - {name: minimal-loc, method_filter: *minimal_loc, analyses: *all_analyses}

  005-uniform-correlation-scale:
    collections:
      template: {signal: scale_2.0, error: gaussian, enrichment: [ser_b2, null_b0]}
      over: {design: *uniform_rho}
      aliases: *rho_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,           method_filter: *minimal,           analyses: *all_analyses}
      - {name: minimal-scale,     method_filter: *minimal_scale,     analyses: *all_analyses}
      - {name: minimal_no_linear, method_filter: *minimal_no_linear, analyses: *all_analyses}
