    template:
      threshold: null
      time_sign: 1.0
    over:
      L:
      - 1
  cox:
    function: run_cox_method
    template:
      time_sign: -1.0
    over:
      threshold:
      - 2.0
      L:
      - 1
  logistic_oracle:
    function: run_logistic_method
    template:
      response_source: z
      threshold: null
    over:
      L:
      - 1
  logistic_threshold:
    function: run_logistic_method
    template:
      response_source: score_threshold
    over:
      threshold:
      - 2.0
      L:
      - 1
  linear_fixed:
    function: run_linear_method
    template:
      estimate_residual_variance: false
    over:
      L:
      - 1
  twogroup_scale_fam:
