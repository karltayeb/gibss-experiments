        Normal:
          loc: 0.0
          scale: 1.0
          estimate_loc: false
          estimate_scale: true
      n_null_iter: 20
      n_intercept_iter: 20
    over:
      L:
      - 1
  twogroup_oracle_init:
    function: run_twogroup_method
    template:
      f1:
        Normal:
          loc: 0.0
          scale: 1.0
          estimate_loc: true
          estimate_scale: true
      oracle_init: true
      n_null_iter: 20
      n_intercept_iter: 20
    over:
      L:
      - 1
