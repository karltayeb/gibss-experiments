defaults:
  base_seed: 20260501
  replicates_per_batch: 50
  n_batches: 1

designs:
  hallmark:
    function: hallmark_gene_sets_X
    arguments: {}
  c4:
    function: c4_gene_sets_X
    arguments: {}
  gaussian_p8:
    function: gaussian_markov_X
    arguments: {n: 30, p: 8, rho: 0.5}
  gaussian_p100:
    function: gaussian_markov_X
    arguments: {n: 500, p: 100, rho: 0.9}
  uniform_p100:
    function: uniform_markov_X
    arguments: {n: 500, p: 100, rho: 0.9}

enrichments:
  ser_b2:
    function: uniform_single_effect
    arguments: {causal_effect: 2.0}
    intercept: -2.0
  null_b0:
    function: uniform_single_effect
    arguments: {causal_effect: 0.0}
    intercept: -2.0

signals:
  loc_0.5:
    f0: {PointMass: {value: 0.0}}
    f1: {Normal: {loc: 0.5, scale: 0.1, estimate_loc: false, estimate_scale: false}}
  loc_1.0:
    f0: {PointMass: {value: 0.0}}
    f1: {Normal: {loc: 1.0, scale: 0.1, estimate_loc: false, estimate_scale: false}}
  loc_1.5:
    f0: {PointMass: {value: 0.0}}
    f1: {Normal: {loc: 1.5, scale: 0.1, estimate_loc: false, estimate_scale: false}}
  loc_2.0:
    f0: {PointMass: {value: 0.0}}
    f1: {Normal: {loc: 2.0, scale: 0.1, estimate_loc: false, estimate_scale: false}}
  loc_2.5:
    f0: {PointMass: {value: 0.0}}
    f1: {Normal: {loc: 2.5, scale: 0.1, estimate_loc: false, estimate_scale: false}}
  loc_3.0:
    f0: {PointMass: {value: 0.0}}
    f1: {Normal: {loc: 3.0, scale: 0.1, estimate_loc: false, estimate_scale: false}}
  scale_2.0:
    f0: {PointMass: {value: 0.0}}
    f1: {Normal: {loc: 0.0, scale: 2.0, estimate_loc: false, estimate_scale: false}}

errors:
  gaussian: null
  t_df_3:  {function: t_error_sampler, arguments: {df: 3}}
  t_df_5:  {function: t_error_sampler, arguments: {df: 5}}
  t_df_10: {function: t_error_sampler, arguments: {df: 10}}
  t_df_30: {function: t_error_sampler, arguments: {df: 30}}

methods:
  twogroup_oracle:
    function: run_twogroup_method
    template:
      f1: null
      n_null_iter: 20
      n_intercept_iter: 20
    over: {L: [1]}

  twogroup:
    function: run_twogroup_method
    template:
      f1: {Normal: {loc: 0.0, scale: 1.0, estimate_loc: true, estimate_scale: true}}
      n_null_iter: 20
      n_intercept_iter: 20
    over: {L: [1]}

  twogroup_loc_fam:
    function: run_twogroup_method
    template:
      f1: {Normal: {loc: 0.0, scale: 0.1, estimate_loc: true, estimate_scale: false}}
      n_null_iter: 20
      n_intercept_iter: 20
    over: {L: [1]}

  cox_heavy:
    function: run_cox_method
    template: {threshold: null, time_sign: 1.0}
    over: {L: [1]}

  cox_light:
    function: run_cox_method
    template: {time_sign: -1.0}
    over: {threshold: [2.0], L: [1]}

  logistic_oracle:
    function: run_logistic_method
    template: {response_source: z, threshold: null}
    over: {L: [1]}

  logistic_threshold:
    function: run_logistic_method
    template: {response_source: score_threshold}
    over: {threshold: [2.0], L: [1]}

  linear_fixed:
    function: run_linear_method
    template: {estimate_residual_variance: false}
    over: {L: [1]}

reductions:
  pip:
    function: build_pip_plot_data
  cs:
    function: build_cs_plot_data
  f1:
    function: build_f1_plot_data
    method_filter: is_twogroup
  enrich:
    function: build_enrich_plot_data
    method_filter: is_twogroup

analyses:
  pip_calibration:         {requires: [pip]}
  agg_pip_calibration:     {requires: [pip]}
  power_fdp:               {requires: [pip]}
  agg_power_fdp:           {requires: [pip]}
  causal_pip:              {requires: [pip], simulation_filter: has_causal}
  agg_causal_pip:          {requires: [pip], simulation_filter: has_causal}
  mass_above_causal:       {requires: [pip], simulation_filter: has_causal}
  agg_mass_above_causal:   {requires: [pip], simulation_filter: has_causal}
  cs_power_fdp:            {requires: [cs]}
  agg_cs_power_fdp:        {requires: [cs]}
  cs_size_power:           {requires: [cs]}
  agg_cs_size_power:       {requires: [cs]}
  cs_radius_power:         {requires: [cs]}
  agg_cs_radius_power:     {requires: [cs]}
  cs_power_size_coverage_trace:     {requires: [cs]}
  agg_cs_power_size_coverage_trace: {requires: [cs]}
  cs_coverage_size:        {requires: [cs]}
  cs_coverage_radius:      {requires: [cs]}
  cs_calibration:          {requires: [cs]}
  cs_calibrated_dot:       {requires: [cs]}
  causal_rank:             {requires: [cs]}
  log_bf_roc:              {requires: [cs]}
  agg_log_bf_roc:          {requires: [cs]}
  f1_boxplot:              {requires: [f1]}
  f1_scatter:              {requires: [f1]}
  f1_enrich_scatter:       {requires: [enrich]}

analysis_groups:
  pip: [pip_calibration, agg_pip_calibration, power_fdp, agg_power_fdp]
  cs:  [cs_power_fdp, agg_cs_power_fdp, cs_size_power, agg_cs_size_power]
