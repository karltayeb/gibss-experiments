methods:
  twogroup_oracle:
    function: run_twogroup_method
    template:
      f1: null
      n_null_iter: 20
      n_intercept_iter: 20
    over:
      L:
      - 1
  twogroup:
    function: run_twogroup_method
    template:
      f1:
        Normal:
          loc: 0.0
          scale: 1.0
          estimate_loc: true
          estimate_scale: true
      n_null_iter: 20
      n_intercept_iter: 20
    over:
      L:
      - 1
  twogroup_loc_fam:
