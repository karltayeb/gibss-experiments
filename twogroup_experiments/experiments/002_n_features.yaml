supercollections:
  002-uniform-n-features-loc:
    collections:
      template:
        signal: loc_2.0
        error: gaussian
        enrichment:
        - ser_b2
        - null_b0
      over:
        design:
        - uniform_rho0.90_n500_p100
        - uniform_rho0.90_n500_p200
        - uniform_rho0.90_n500_p400
        - uniform_rho0.90_n500_p800
        - uniform_rho0.90_n500_p1600
      aliases:
      - p=100
      - p=200
      - p=400
      - p=800
      - p=1600
    methods:
    - cox_reversed__L=1
    - cox__threshold=2.00__L=1
    - linear_fixed__L=1
    - logistic_threshold__threshold=2.00__L=1
    - twogroup__L=1
    - twogroup_loc_fam__L=1
    - twogroup_oracle__L=1
    default_args:
      min_log_bf: 2.0
      max_cs_size: 10000
      max_fdp: 0.5
    outputs:
    - name: minimal
      method_filter: &id001
      - twogroup_oracle__L=1
      - cox_reversed__L=1
      - cox__threshold=2.00__L=1
      - logistic_threshold__threshold=2.00__L=1
      - linear_fixed__L=1
      analyses:
      - pip
      - cs
      - logbf
      - pip_non_null
      - cs_non_null
    - name: minimal-loc
      method_filter: &id002
      - twogroup_oracle__L=1
      - twogroup__L=1
      - twogroup_loc_fam__L=1
      analyses:
      - pip
