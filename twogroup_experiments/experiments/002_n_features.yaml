# 002 n-features sweep: vary p across collections (rho=0.9, n=500). Each
# collection holds the ser/null pair; *_non_null analyses scope to ser via
# the has_causal simulation_filter (null+non-null collapsed into one SC).
_anchors:
  p_aliases: &p_aliases [p=100, p=200, p=400, p=800, p=1600]
  gaussian_p: &gaussian_p
    [gaussian_rho0.90_n500_p100, gaussian_rho0.90_n500_p200, gaussian_rho0.90_n500_p400, gaussian_rho0.90_n500_p800, gaussian_rho0.90_n500_p1600]
  uniform_p: &uniform_p
    [uniform_rho0.90_n500_p100, uniform_rho0.90_n500_p200, uniform_rho0.90_n500_p400, uniform_rho0.90_n500_p800, uniform_rho0.90_n500_p1600]
  minimal: &minimal
    [twogroup_oracle__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1, logistic_threshold__threshold=2.00__L=1, linear_fixed__L=1]
  minimal_no_linear: &minimal_no_linear
    [twogroup_oracle__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1, logistic_threshold__threshold=2.00__L=1]
  minimal_loc: &minimal_loc [twogroup_oracle__L=1, twogroup__L=1, twogroup_loc_fam__L=1]
  minimal_scale: &minimal_scale [twogroup_oracle__L=1, twogroup__L=1, twogroup_scale_fam__L=1]
  default_args: &default_args {min_log_bf: 2.0, max_cs_size: 10000, max_fdp: 0.5}
  methods_loc: &methods_loc
    [twogroup_oracle__L=1, twogroup__L=1, twogroup_loc_fam__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1,
     logistic_threshold__threshold=2.00__L=1, linear_fixed__L=1]
  methods_scale: &methods_scale
    [twogroup_oracle__L=1, twogroup__L=1, twogroup_scale_fam__L=1, cox_reversed__L=1, cox__threshold=2.00__L=1,
     logistic_threshold__threshold=2.00__L=1, linear_fixed__L=1]
  all_analyses: &all_analyses [pip, pip_non_null, cs, cs_non_null, logbf]

supercollections:
  002-gaussian-n-features-loc:
    collections:
      template: {enrichment: [ser_b2, null_b0], signal: loc_2.0, error: gaussian}
      over: {design: *gaussian_p}
      aliases: *p_aliases
    methods: *methods_loc
    default_args: *default_args
    outputs:
      - {name: minimal,     method_filter: *minimal,     analyses: *all_analyses}
      - {name: minimal-loc, method_filter: *minimal_loc, analyses: *all_analyses}

  002-gaussian-n-features-scale:
    collections:
      template: {enrichment: [ser_b2, null_b0], signal: scale_2.0, error: gaussian}
      over: {design: *gaussian_p}
      aliases: *p_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,           method_filter: *minimal,           analyses: *all_analyses}
      - {name: minimal-scale,     method_filter: *minimal_scale,     analyses: *all_analyses}
      - {name: minimal_no_linear, method_filter: *minimal_no_linear, analyses: *all_analyses}

  002-uniform-n-features-loc:
    collections:
      template: {enrichment: [ser_b2, null_b0], signal: loc_2.0, error: gaussian}
      over: {design: *uniform_p}
      aliases: *p_aliases
    methods: *methods_loc
    default_args: *default_args
    outputs:
      - {name: minimal,     method_filter: *minimal,     analyses: *all_analyses}
      - {name: minimal-loc, method_filter: *minimal_loc, analyses: *all_analyses}

  002-uniform-n-features-scale:
    collections:
      template: {enrichment: [ser_b2, null_b0], signal: scale_2.0, error: gaussian}
      over: {design: *uniform_p}
      aliases: *p_aliases
    methods: *methods_scale
    default_args: *default_args
    outputs:
      - {name: minimal,           method_filter: *minimal,           analyses: *all_analyses}
      - {name: minimal-scale,     method_filter: *minimal_scale,     analyses: *all_analyses}
      - {name: minimal_no_linear, method_filter: *minimal_no_linear, analyses: *all_analyses}
