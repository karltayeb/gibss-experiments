supercollections:
  # --- hallmark: non-null, vary loc ---
  003-hallmark-loc-snr-non-null:
    collections:
      - name: design=hallmark__enrichment=ser_enrich__signal=loc_0.50
        alias: loc=0.50
      - name: design=hallmark__enrichment=ser_enrich__signal=loc_1.00
        alias: loc=1.00
      - name: design=hallmark__enrichment=ser_enrich__signal=loc_1.50
        alias: loc=1.50
      - name: design=hallmark__enrichment=ser_enrich__signal=loc_2.00
        alias: loc=2.00
      - name: design=hallmark__enrichment=ser_enrich__signal=loc_2.50
        alias: loc=2.50
      - name: design=hallmark__enrichment=ser_enrich__signal=loc_3.00
        alias: loc=3.00
    default_settings:
      thresholds:
        - 2.0
      min_log_bf: 2.0
      max_cs_size: 10000
      max_fdp: 0.5
    plots:
      - settings:
          - minimal
          - minimal-loc
        plot_type_groups:
          - pip
          - pip_non_null
