supercollections:
  # --- uniform: non-null, vary p (loc) ---
  002-uniform-n-features-loc-non-null:
    collections:
      - name: design=uniform_rho_0.90_n_500_p_100__enrichment=ser_enrich__signal=loc_2.00
        alias: p=100
      - name: design=uniform_rho_0.90_n_500_p_200__enrichment=ser_enrich__signal=loc_2.00
        alias: p=200
      - name: design=uniform_rho_0.90_n_500_p_400__enrichment=ser_enrich__signal=loc_2.00
        alias: p=400
      - name: design=uniform_rho_0.90_n_500_p_800__enrichment=ser_enrich__signal=loc_2.00
        alias: p=800
      - name: design=uniform_rho_0.90_n_500_p_1600__enrichment=ser_enrich__signal=loc_2.00
        alias: p=1600
    default_settings:
      thresholds:
        - 2.0
      min_log_bf: 2.0
      max_cs_size: 10000
      max_fdp: 0.5
    plots:
      - settings:
          - minimal
          - minimal-loc
        plot_type_groups:
          - pip
          - pip_non_null
