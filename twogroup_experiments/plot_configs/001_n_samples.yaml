      - name: design=uniform_rho_0.90_n_1000_p_200__enrichment=ser_enrich__signal=loc_2.00
        alias: n=1000
      - name: design=uniform_rho_0.90_n_2000_p_200__enrichment=ser_enrich__signal=loc_2.00
        alias: n=2000
    default_settings:
      thresholds:
