# library.yaml — building blocks for logistic SuSiE experiments.
# Simulation model has two axes: design (X) x enrichment (causal effect + intercept).
defaults:
  base_seed: 20260501
  replicates_per_batch: 20
  n_batches: 1

designs:
  hallmark:
    function: hallmark_gene_sets_X
    arguments: {}
  gaussian_rho0.90_n500_p100:
    function: gaussian_markov_X
    arguments: { n: 500, p: 100, rho: 0.9 }
  uniform_rho0.90_n500_p100:
    function: uniform_markov_X
    arguments: { n: 500, p: 100, rho: 0.9 }
  gaussian_p8_smoke:
    function: gaussian_markov_X
    arguments: { n: 200, p: 8, rho: 0.5 }
  c4:
    function: c4_gene_sets_X
    arguments: {}

enrichments:
  # Enrichment FAMILY: any list-valued field (intercept or an argument) is a grid
  # axis; the cartesian product expands into concrete enrichments named via the
  # `name` template. The family key `ser` also becomes a group of all member names
  # that experiments can reference in one `over` axis. Use `:g` in the template for
  # clean numeric labels (1.5 -> "1.5", -2.0 -> "-2").
  ser:
    function: uniform_single_effect
    arguments:
      causal_effect: [-1.5, -1, -0.5, -0.2, -0.1, 0.1, 0.2, 0.5, 1, 1.5]
    intercept: [-2, -1, 0, 1, 2]
    name: "ser__b0={intercept:g}__b={causal_effect:g}"
  ser_null:
    function: uniform_single_effect
    arguments: { causal_effect: 0.0 }
    intercept: [-2.0, -1., 0.0, 1., 2.0]
    name: "ser__b0={intercept:g}_null"

# Each method is one gibss logistic SuSiE implementation. logistic_quadrature is
# the most accurate reference; globaljj / localjj are the variational variants;
# profile_cheb is the intercept-profiled SER (gibss.logistic_profile) with the
# sparse Chebyshev background — numerically identical to the exact-quadrature
# background on these designs, so only the fast variant is kept.
methods:
  globaljj:
    function: run_logistic_method
    template: { impl: globaljj, L: 1 }
  localjj:
    function: run_logistic_method
    template: { impl: localjj, L: 1 }
  quadrature:
    function: run_logistic_method
    template: { impl: logistic_quadrature, L: 1 }
  profile_cheb:
    function: run_logistic_method
    template:
      impl: logistic_profile
      L: 1
      family_state_kwargs: { background_mode: chebyshev }
  # one-step Taylor (score) linearizations: linear SER on a recoded response.
  # score expands about eta0=0 (free intercept); score_null_intercept expands
  # about the null-MLE intercept logit(ybar), held fixed.
  score:
    function: run_score_method
    template: { null_intercept: false, L: 1 }
  score_null_intercept:
    function: run_score_method
    template: { null_intercept: true, L: 1 }

reductions:
  pip:
    function: build_pip_plot_data
  cs:
    function: build_cs_plot_data

# Each analysis names the reduction(s) it consumes and an optional
# simulation_filter. `requires` reflects which plot_data the renderer reads
# (mass_above_causal reads cs_plot_data despite being in the pip family).
analyses:
  # --- pip family ---
  pip_calibration: { requires: [pip] }
  agg_pip_calibration: { requires: [pip] }
  power_fdp: { requires: [pip] }
  agg_power_fdp: { requires: [pip] }
  causal_pip: { requires: [pip], simulation_filter: has_causal }
  agg_causal_pip: { requires: [pip], simulation_filter: has_causal }
  mass_above_causal: { requires: [cs], simulation_filter: has_causal }
  agg_mass_above_causal: { requires: [cs], simulation_filter: has_causal }
  # --- cs family ---
  # power/FDP keep nulls (false positives); coverage-bearing analyses filter them
  # out (a null sim has no causal, so it can only ever read as "not covered" and
  # caps empirical coverage at the causal fraction).
  cs_power_fdp: { requires: [cs] }
  agg_cs_power_fdp: { requires: [cs] }
  causal_rank: { requires: [cs] }
  agg_causal_rank: { requires: [cs] }
  preceding_posterior_mass_ecdf: { requires: [cs] }
  agg_preceding_posterior_mass_ecdf: { requires: [cs] }
  cs_size_power: { requires: [cs], simulation_filter: has_causal }
  agg_cs_size_power: { requires: [cs], simulation_filter: has_causal }
  cs_radius_power: { requires: [cs], simulation_filter: has_causal }
  agg_cs_radius_power: { requires: [cs], simulation_filter: has_causal }
  cs_power_size_coverage_trace: { requires: [cs], simulation_filter: has_causal }
  agg_cs_power_size_coverage_trace: { requires: [cs], simulation_filter: has_causal }
  cs_coverage_trace: { requires: [cs], simulation_filter: has_causal }
  agg_cs_coverage_trace: { requires: [cs], simulation_filter: has_causal }
  cs_dot_summary: { requires: [cs], simulation_filter: has_causal }
  cs_calibration: { requires: [cs], simulation_filter: has_causal }
  agg_cs_calibration: { requires: [cs], simulation_filter: has_causal }
  cs_coverage_size: { requires: [cs], simulation_filter: has_causal }
  agg_cs_coverage_size: { requires: [cs], simulation_filter: has_causal }
  cs_coverage_radius: { requires: [cs], simulation_filter: has_causal }
  agg_cs_coverage_radius: { requires: [cs], simulation_filter: has_causal }
  cs_calibrated_dot: { requires: [cs], simulation_filter: has_causal }
  agg_cs_calibrated_dot: { requires: [cs], simulation_filter: has_causal }

analysis_groups:
  pip:
    - pip_calibration
    - agg_pip_calibration
    - power_fdp
    - agg_power_fdp
  pip_non_null:
    - causal_pip
    - agg_causal_pip
    - mass_above_causal
    - agg_mass_above_causal
  cs:
    - cs_power_size_coverage_trace
    - agg_cs_power_size_coverage_trace
    - cs_power_fdp
    - agg_cs_power_fdp
    - cs_size_power
    - agg_cs_size_power
    - cs_radius_power
    - agg_cs_radius_power
  cs_non_null:
    - cs_coverage_size
    - agg_cs_coverage_size
    - cs_coverage_radius
    - agg_cs_coverage_radius
    - cs_calibrated_dot
    - agg_cs_calibrated_dot
  cs_extra:
    - causal_rank
    - agg_causal_rank
    - cs_dot_summary
    - cs_coverage_trace
    - agg_cs_coverage_trace
    - cs_calibration
    - agg_cs_calibration
    - preceding_posterior_mass_ecdf
    - agg_preceding_posterior_mass_ecdf
