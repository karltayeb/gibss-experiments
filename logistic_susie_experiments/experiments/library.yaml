# library.yaml — building blocks for logistic SuSiE experiments.
# Simulation model has two axes: design (X) x enrichment (causal effect + intercept).
defaults:
  base_seed: 20260501
  replicates_per_batch: 20
  n_batches: 1

designs:
  hallmark:
    function: hallmark_gene_sets_X
    arguments: {}
  gaussian_rho0.90_n500_p100:
    function: gaussian_markov_X
    arguments: {n: 500, p: 100, rho: 0.9}
  uniform_rho0.90_n500_p100:
    function: uniform_markov_X
    arguments: {n: 500, p: 100, rho: 0.9}
  gaussian_p8_smoke:
    function: gaussian_markov_X
    arguments: {n: 200, p: 8, rho: 0.5}

enrichments:
  ser_b2:
    function: uniform_single_effect
    arguments: {causal_effect: 2.0}
    intercept: -2.0
  null_b0:
    function: uniform_single_effect
    arguments: {causal_effect: 0.0}
    intercept: -2.0
  # moderate single-effect enrichment for the global-vs-local comparison
  ser_mod:
    function: uniform_single_effect
    arguments: {causal_effect: 1.5}
    intercept: -1.0

# Each method is one gibss logistic SuSiE implementation. logistic_quadrature is
# the most accurate reference; globaljj / localjj are the variational variants.
methods:
  globaljj:
    function: run_logistic_method
    template: {impl: globaljj, L: 1}
  localjj:
    function: run_logistic_method
    template: {impl: localjj, L: 1}
  quadrature:
    function: run_logistic_method
    template: {impl: logistic_quadrature, L: 1}

reductions:
  pip:
    function: build_pip_plot_data
  cs:
    function: build_cs_plot_data

# Each analysis names the reduction(s) it consumes and an optional
# simulation_filter. `requires` reflects which plot_data the renderer reads
# (mass_above_causal reads cs_plot_data despite being in the pip family).
analyses:
  # --- pip family ---
  pip_calibration:        {requires: [pip]}
  agg_pip_calibration:    {requires: [pip]}
  power_fdp:              {requires: [pip]}
  agg_power_fdp:          {requires: [pip]}
  causal_pip:             {requires: [pip], simulation_filter: has_causal}
  agg_causal_pip:         {requires: [pip], simulation_filter: has_causal}
  mass_above_causal:      {requires: [cs],  simulation_filter: has_causal}
  agg_mass_above_causal:  {requires: [cs],  simulation_filter: has_causal}
  # --- cs family ---
  causal_rank:                       {requires: [cs]}
  agg_causal_rank:                   {requires: [cs]}
  cs_power_fdp:                      {requires: [cs]}
  agg_cs_power_fdp:                  {requires: [cs]}
  cs_size_power:                     {requires: [cs]}
  agg_cs_size_power:                 {requires: [cs]}
  cs_radius_power:                   {requires: [cs]}
  agg_cs_radius_power:               {requires: [cs]}
  cs_power_size_coverage_trace:      {requires: [cs]}
  agg_cs_power_size_coverage_trace:  {requires: [cs]}
  cs_coverage_trace:                 {requires: [cs]}
  agg_cs_coverage_trace:             {requires: [cs]}
  cs_dot_summary:                    {requires: [cs]}
  cs_calibration:                    {requires: [cs]}
  agg_cs_calibration:                {requires: [cs]}
  preceding_posterior_mass_ecdf:     {requires: [cs]}
  agg_preceding_posterior_mass_ecdf: {requires: [cs]}
  cs_coverage_size:                  {requires: [cs], simulation_filter: has_causal}
  agg_cs_coverage_size:              {requires: [cs], simulation_filter: has_causal}
  cs_coverage_radius:                {requires: [cs], simulation_filter: has_causal}
  agg_cs_coverage_radius:            {requires: [cs], simulation_filter: has_causal}
  cs_calibrated_dot:                 {requires: [cs], simulation_filter: has_causal}
  agg_cs_calibrated_dot:             {requires: [cs], simulation_filter: has_causal}

analysis_groups:
  pip:
    - pip_calibration
    - agg_pip_calibration
    - power_fdp
    - agg_power_fdp
  pip_non_null:
    - causal_pip
    - agg_causal_pip
    - mass_above_causal
    - agg_mass_above_causal
  cs:
    - cs_power_size_coverage_trace
    - agg_cs_power_size_coverage_trace
    - cs_power_fdp
    - agg_cs_power_fdp
    - cs_size_power
    - agg_cs_size_power
    - cs_radius_power
    - agg_cs_radius_power
  cs_non_null:
    - cs_coverage_size
    - agg_cs_coverage_size
    - cs_coverage_radius
    - agg_cs_coverage_radius
    - cs_calibrated_dot
    - agg_cs_calibrated_dot
  cs_extra:
    - causal_rank
    - agg_causal_rank
    - cs_dot_summary
    - cs_coverage_trace
    - agg_cs_coverage_trace
    - cs_calibration
    - agg_cs_calibration
    - preceding_posterior_mass_ecdf
    - agg_preceding_posterior_mass_ecdf
