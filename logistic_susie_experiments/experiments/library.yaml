# library.yaml — building blocks for logistic SuSiE experiments.
# Simulation model has two axes: design (X) x enrichment (causal effect + intercept).
defaults:
  base_seed: 20260501
  replicates_per_batch: 50
  n_batches: 2

# Gene-set designs (X). Kept for the upcoming gene-set experiments; the active
# Markov designs are generated inline by 000_markov's sweep blocks (function +
# n/p/rho), so they need no named entries here.
designs:
  hallmark:
    function: hallmark_gene_sets_X
    arguments: {}
  c4:
    function: c4_gene_sets_X
    arguments: {}

# Enrichments are generated inline by sweep blocks (logbf_single_effect). A
# `simulations:` collection can still reference a literal enrichment defined here
# (a plain {function, arguments, intercept} entry) if ever needed.
enrichments: {}

# Each method is one gibss logistic SuSiE implementation. logistic_quadrature is
# the most accurate reference; globaljj / localjj are the variational variants;
# profile_cheb is the intercept-profiled SER (gibss.logistic_profile) with the
# sparse Chebyshev background — numerically identical to the exact-quadrature
# background on these designs, so only the fast variant is kept.
methods:
  globaljj:
    function: run_logistic_method
    template: { impl: globaljj, L: 1 }
  localjj:
    function: run_logistic_method
    template: { impl: localjj, L: 1 }
  quadrature:
    function: run_logistic_method
    template: { impl: logistic_quadrature, L: 1 }
  irls:
    function: run_logistic_method
    template: { impl: irls, L: 1 }
  # block IRLS: outer Fisher-scoring loop, fixed null intercept; n_outer=1 is
  # exactly score_null, larger n_outer -> the Laplace fixed point.
  block_irls:
    function: run_block_irls_method
    template: { n_outer: 1, L: 1 }
  profile_cheb:
    function: run_logistic_method
    template:
      impl: logistic_profile
      L: 1
      family_state_kwargs: { background_mode: chebyshev }
  # one-step Taylor (score) linearizations: linear SER on a recoded response.
  # score expands about eta0=0 (free intercept); score_null_intercept expands
  # about the null-MLE intercept logit(ybar), held fixed.
  score:
    function: run_score_method
    template: { null_intercept: false, L: 1 }
  score_null_intercept:
    function: run_score_method
    template: { null_intercept: true, L: 1 }

reductions:
  pip:
    function: build_pip_plot_data
  cs:
    function: build_cs_plot_data

