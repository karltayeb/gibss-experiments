# 000_global_local — globaljj vs localjj on a logistic SER.
# Design: Gaussian Markov, rho = 0.9 (n=500, p=100). Facet over effect size at
# fixed intercept b0 = -2 (each effect is its own collection / facet column).
# Each facet pairs the signal enrichment with the matching b0=-2 null so
# calibration / power-FDP have a proper global-null component.
# Full pip + cs plot suite.
supercollections:
  000_global_local:
    collections:
      template: {design: gaussian_rho0.90_n500_p100}
      over:
        enrichment:
          - [ser__b0=-2__b=-1,   ser__b0=-2_null]
          - [ser__b0=-2__b=-0.5, ser__b0=-2_null]
          - [ser__b0=-2__b=0.5,  ser__b0=-2_null]
          - [ser__b0=-2__b=1,    ser__b0=-2_null]
      aliases: ["b=-1", "b=-0.5", "b=0.5", "b=1"]
    methods: [globaljj, localjj]
    default_args:
      min_log_bf: 2.0
      max_cs_size: 10000
      max_fdp: 0.5
      cs_beta: 0.95
    outputs:
      - name: global_local
        method_filter: [globaljj, localjj]
        analyses: [pip, pip_non_null, cs, cs_non_null, cs_extra]
