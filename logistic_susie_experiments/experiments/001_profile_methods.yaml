# 001_profile_methods — compare the six logistic SuSiE implementations
# (globaljj, localjj, quadrature, profile_cheb, score, score_null_intercept) on
# a sparse gene-set design.
#
# Design: c4 gene sets (10749 genes x 1006 sets). Facet over effect size
# b in {0.5, 1.0, 1.5} at fixed intercept b0 = -2 (one collection / facet each),
# pairing each signal with the matching b0=-2 null so calibration / power-FDP
# have a proper global-null component. Sweeping b traces where the methods
# diverge as the logits grow (globaljj over-confidence vs the tighter methods).
# Full pip + cs plot suite.
supercollections:
  001_profile_methods:
    collections:
      template:
        design: c4
      over:
        enrichment:
          - [ser__b0=-2__b=0.5, ser__b0=-2_null]
          - [ser__b0=-2__b=1,   ser__b0=-2_null]
          - [ser__b0=-2__b=1.5, ser__b0=-2_null]
          - [ser__b0=-2__b=2,   ser__b0=-2_null]
          - [ser__b0=-2__b=3,   ser__b0=-2_null]
          - [ser__b0=-2__b=4,   ser__b0=-2_null]
      aliases: ["b=0.5", "b=1.0", "b=1.5", "b=2.0", "b=3.0", "b=4.0"]
    methods: [globaljj, localjj, quadrature, profile_cheb, score, score_null_intercept]
    default_args:
      min_log_bf: 2.0
      max_cs_size: 10000
      max_fdp: 0.5
      cs_beta: 0.95
    outputs:
      - name: profile_methods
        method_filter: [globaljj, localjj, quadrature, profile_cheb, score, score_null_intercept]
        analyses: [pip, pip_non_null, cs, cs_non_null, cs_extra]

  # L=5 SuSiE on a 3-causal scenario: same six methods, fit with L=5, on c4 with
  # 3 causal gene sets (multi_k3_b1.5, b0=-2) paired with the b0=-2 null. Methods
  # are inlined here at L=5 so the L=1 method bank (used above) is untouched.
  001_susie_L5:
    collections:
      template:
        design: c4
      over:
        enrichment:
          - [mult__k=3__b0=-2__b=0.5, ser__b0=-2_null]
          - [mult__k=3__b0=-2__b=1,   ser__b0=-2_null]
          - [mult__k=3__b0=-2__b=1.5, ser__b0=-2_null]
          - [mult__k=3__b0=-2__b=2,   ser__b0=-2_null]
          - [mult__k=3__b0=-2__b=3,   ser__b0=-2_null]
          - [mult__k=3__b0=-2__b=4,   ser__b0=-2_null]
      aliases: ["b=0.5", "b=1.0", "b=1.5", "b=2.0", "b=3.0", "b=4.0"]
    methods:
      - globaljj:     { function: run_logistic_method, template: { impl: globaljj },           over: { L: [5] } }
      - localjj:      { function: run_logistic_method, template: { impl: localjj },            over: { L: [5] } }
      - quadrature:   { function: run_logistic_method, template: { impl: logistic_quadrature }, over: { L: [5] } }
      - profile_cheb: { function: run_logistic_method, template: { impl: logistic_profile, family_state_kwargs: { background_mode: chebyshev } }, over: { L: [5] } }
      - score:                { function: run_score_method, template: { null_intercept: false }, over: { L: [5] } }
      - score_null_intercept: { function: run_score_method, template: { null_intercept: true },  over: { L: [5] } }
    default_args:
      min_log_bf: 2.0
      max_cs_size: 10000
      max_fdp: 0.5
      cs_beta: 0.95
    outputs:
      - name: susie_L5
        method_filter: [globaljj__L=5, localjj__L=5, quadrature__L=5, profile_cheb__L=5, score__L=5, score_null_intercept__L=5]
        analyses: [pip, pip_non_null, cs, cs_non_null, cs_extra]
