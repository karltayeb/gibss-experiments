# 002_global — one supercollection comparing the logistic SuSiE SER variants
# (interleaved vs block reweighting) across {EB, fixed sigma0^2=100} and, where
# applicable, weighted-centering {global, local}. L=1. Plot groups (defined later)
# subset the method_filter to focus comparisons; everything is fit here once.
#
# Method families:
#   irls_block_1   block IRLS, n_outer=1, center=false. == score_null (bit-for-bit:
#                  intercept init at logit(ybar), one no-op Newton step at effects=0).
#   irls_block_*   block IRLS to convergence (outer reweight, inner SER converged).
#   irls_*         interleaved IRLS / Laplace (gibss.irls default_schedule).
#   globaljj_*     interleaved global-JJ variational SER.
#   globaljj_block_*  block global-JJ (outer reweight, inner SER converged).
#   score_null     one-step linear SER at the null MLE intercept (the calibrated
#                  one-step reference).
#
# Comparability notes (verified numerically):
#   - irls_block_1 (center=false) == score_null.
#   - irls_block_* with center=TRUE == interleaved irls_* (same Laplace fixed
#     point). With center=FALSE the block fit DIVERGES from interleaved: the
#     effect column's nonzero finite-sample mean lets the effect absorb part of
#     the intercept, splitting the intercept/effect-mean identifiability
#     differently and inflating the SER logBF. Both center cells are kept to make
#     that failure visible.
#   - globaljj_block_* (converged) == interleaved globaljj_* (coordinate ascent on
#     the same ELBO; JJ has no centering, so no identifiability ambiguity).
#
# Harder Gaussian setting vs 001/002_irls: weaker effect b=1.0 (lower power) on
# the rho0.90 centered design; c4 keeps b=1.5.
_anchors:
  collections: &collections
    - name: gaussian
      template:
        design: gaussian_rho0.90_n500_p100
        enrichment: [ser__b0=-2__b=1, ser__b0=-2_null]
      alias: "gaussian (centered, b=1.0)"
    - name: c4
      template:
        design: c4
        enrichment: [ser__b0=-2__b=1.5, ser__b0=-2_null]
      alias: "c4 (uncentered, b=1.5)"
  default_args: &default_args
    min_log_bf: 2.0
    max_cs_size: 10000
    max_fdp: 0.5
    cs_beta: 0.95
  analyses: &analyses [pip, pip_non_null, cs, cs_non_null, cs_extra]
  # key set for the pairwise contrasts: PIP calibration, FDP/FDR (power-FDP),
  # CS calibration, and CS resolution/power tradeoff (size-vs-power).
  key_analyses: &key_analyses
    - pip_calibration
    - agg_pip_calibration
    - power_fdp
    - agg_power_fdp
    - cs_calibration
    - agg_cs_calibration
    - cs_size_power
    - agg_cs_size_power

supercollections:
  002_global:
    n_batches: 4  # 4 batches x 50 replicates = 200 reps per simulation
    collections: *collections
    # NOTE: L=1 here, so the four reweight cadences (block/interleaved/greedy/
    # thorough) all coincide. Only block is instantiated (n_outer=1 ref + the
    # converged fit). Add interleaved/greedy/thorough rows alongside an L>1
    # collection, where they actually differ.
    methods:
      # --- the calibrated one-step references (n_outer=1), EB / fixed x center ---
      # irls_block_1_eb (center=false) == score_null bit-for-bit; center=true is
      # the one-step + weighted centering at the null. globaljj_block_1_*: JJ
      # analog (global intercept only, no center axis).
      - irls_block_1_eb:        {function: run_irls_method,      template: {ser_cadence: block, n_outer: 1, L: 1}, over: {center: [true, false]}}
      - irls_block_1_fixed:     {function: run_irls_method,      template: {ser_cadence: block, n_outer: 1, L: 1, estimate_prior_variance: false, prior_variance: 100.0}, over: {center: [true, false]}}
      - globaljj_block_1_eb:    {function: run_globaljj_method, template: {ser_cadence: block, n_outer: 1, L: 1}}
      - globaljj_block_1_fixed: {function: run_globaljj_method, template: {ser_cadence: block, n_outer: 1, L: 1, estimate_prior_variance: false, prior_variance: 100.0}}

      # --- IRLS (Laplace) block, EB / fixed x center {global, local} ---
      - irls_block_eb:     {function: run_irls_method,      template: {ser_cadence: block, n_outer: 50, L: 1}, over: {center: [true, false]}}
      - irls_block_fixed:  {function: run_irls_method,      template: {ser_cadence: block, n_outer: 50, L: 1, estimate_prior_variance: false, prior_variance: 100.0}, over: {center: [true, false]}}

      # --- global-JJ block, EB / fixed ---
      - globaljj_block_eb:    {function: run_globaljj_method, template: {ser_cadence: block, n_outer: 50, L: 1}}
      - globaljj_block_fixed: {function: run_globaljj_method, template: {ser_cadence: block, n_outer: 50, L: 1, estimate_prior_variance: false, prior_variance: 100.0}}
    default_args: *default_args
    # Pairwise contrasts off the reference (converged + fixed + global =
    # irls_block_fixed__center=false / globaljj_block_fixed): each group varies
    # ONE factor. NOTE: center_irls overlays two methods that share a family base
    # (irls_block_fixed) -> same color in the current renderer; legend still
    # distinguishes them. Other groups use distinct families -> distinct colors.
    outputs:
      - {name: step_irls,   method_filter: [irls_block_1_fixed__center=false, irls_block_fixed__center=false], analyses: *key_analyses}
      - {name: step_jj,     method_filter: [globaljj_block_1_fixed, globaljj_block_fixed], analyses: *key_analyses}
      - {name: prior_irls,  method_filter: [irls_block_eb__center=false, irls_block_fixed__center=false], analyses: *key_analyses}
      - {name: prior_jj,    method_filter: [globaljj_block_eb, globaljj_block_fixed], analyses: *key_analyses}
      - {name: center_irls, method_filter: [irls_block_fixed__center=true, irls_block_fixed__center=false], analyses: *key_analyses}
      - {name: family,      method_filter: [irls_block_fixed__center=false, globaljj_block_fixed], analyses: *key_analyses}
      - {name: all,         analyses: *key_analyses}
